                call_m.set_value(m);
                call_m.perform();
                ESP_LOGI("Timer", "Zeitplaner aktualisiert: %02d:%02d", h, m);
              } else {
                ESP_LOGW("Timer", "Zeit außerhalb des Bereichs (00:00-23:59)!");
              }
            } else {
              ESP_LOGW("Timer", "Format ungültig! Bitte HH:MM eingeben.");

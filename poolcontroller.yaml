  - platform: template
    name: "${friendly_name_entity} Betriebszeit seit Boot"
    id: uptime_human
    icon: mdi:clock-start
    web_server:
      sorting_group_id: grp_system
    entity_category: diagnostic
    update_interval: 60s
    lambda: |-
      // Zeit berechnen
      uint32_t total_seconds = id(uptime_raw).state; // Verweist auf deinen sensor: uptime
      uint32_t days = total_seconds / 86400;
      uint32_t hours = (total_seconds % 86400) / 3600;
      uint32_t minutes = (total_seconds % 3600) / 60;
      uint32_t seconds = total_seconds % 60;

      if (days > 3650) {
        return {"Wird gestartet..."};
      }
      
      if (days > 0) {
        return {esphome::str_sprintf("%dd %dh %dm %ds", days, hours, minutes, seconds)};
      } else if (hours > 0) {
        return {esphome::str_sprintf("%dh %dm %ds", hours, minutes, seconds)};
      } else if (minutes > 0) {
        return {esphome::str_sprintf("%dm %ds", minutes, seconds)};
      } else {
        return {esphome::str_sprintf("%ds", seconds)};
      }


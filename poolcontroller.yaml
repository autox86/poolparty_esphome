  # Zeigt den Grund des letzten Restarts!
  - platform: template
    name: "${friendly_name_entity} Letzter Restart Grund"
    id: last_reset_reason_sensor
    icon: "mdi:history"
    web_server:
      sorting_group_id: grp_system

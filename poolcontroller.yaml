######Status Script#############################################################
################################################################################
  - id: script_status
    mode: single
    then:
      - lambda: |-
          const char* TAG = "Status";

          ESP_LOGW(TAG, "");
          ESP_LOGW(TAG, "");
          ESP_LOGW(TAG, "##################################################################################");
          ESP_LOGW(TAG, "##########################Status - Start##########################################");
          ESP_LOGW(TAG, "##################################################################################");
          ESP_LOGW(TAG, "");

          // 0. Workmode Global Variabel Check
          ESP_LOGI(TAG, "%-40s | %s", "Workmode wenn nicht 'Wartung'", id(glo_workmode).c_str());

          // 1. Poolpumpe (Bool Global)
          ESP_LOGI(TAG, "%-40s | %-12s |", "Poolpumpenvorlauf status", id(poolpump_ok) ? "OK" : "Warten");

          ESP_LOGI(TAG, "--- Chlor / Desinfektion ---------------------------------------------------------");

          // 2. Chlor (Bool Global + Sensoren)
          ESP_LOGI(TAG, "%-40s | %-12s | ORP Ist: %.2f Min: %.2f", 
                   "Chlor benötigt:", id(chlor_needed) ? "Ja" : "Nein", id(orp_measvalue).state, id(glo_orp_min));

          // 3. Max-Werte (Bool Globals)
          ESP_LOGI(TAG, "%-40s | %-12s |", "Chlor tägl. max. erreicht", id(chlorinator_max_reached) ? "JA" : "Nein");

          // 4. Darf ORP interval loslaufen?
          ESP_LOGI(TAG, "%-40s | %-12s |", "Chlorlauf erlaubt?", id(glo_orp_allowed) ? "Ja" : "Nein");

          // 11. Laufzeit Chlorinator Heute Gesamt
          ESP_LOGI(TAG, "%-40s | %9.2f Min |", "Laufzeit Chlorinator heute", (id(chlorinator_today_run_time) / 60.0f));

          // 12. Restlaufzeit Chlorinator dieser Zyklus
          ESP_LOGI(TAG, "%-40s | %9.2f Min |", "Chlorinator läuft noch für", (id(chlorinator_remaining_seconds) / 60.0f));

          // 13. Polarität des Chlorinators
          ESP_LOGI(TAG, "%-40s | %-12s |", "Polarität derzeitiger Zyklus", id(chlorinator_polarity) ? "GPIOHigh" : "GPIOLow");

          ESP_LOGI(TAG, "--- PH-Wert Regulierung ----------------------------------------------------------");

          // 5. PH (Bool Global + Sensoren)
          ESP_LOGI(TAG, "%-40s | %-12s | PH Ist: %.2f Max: %.2f", 
                   "PH benötigt:", id(ph_needed) ? "Ja" : "Nein", id(ph_measvalue).state, id(ph_max));

          // 6. PH Dosierung (Bool Global + Float Globals)
          ESP_LOGI(TAG, "%-40s | %-12s | Ist: %.2fml Max: %.2fml", 
                   "PH Minus tägl. max. erreicht", id(ph_max_injection_reached) ? "JA" : "Nein", id(ph_today_ml), id(max_ph_ml_per_day));

          // 7. PH Sperre (Bool Global)
          ESP_LOGI(TAG, "%-40s | %-12s |", "PH Minus Zyklus gesperrt", id(ph_locked) ? "Ja" : "Nein");

          // 8. Tank (Float Global)
          ESP_LOGI(TAG, "%-40s | %-12s | Tankgröße: %.2fl Füllstand: %.2fl", 
                   "PH Tank nachfüllen?", id(ph_tank_refill) ? "Ja" : "Nein", (id(ph_tank_capacity_ml) / 1000.0), (id(ph_tank_remaining) / 1000.0));

          // NEU: Letztes Zyklus PH
          ESP_LOGI(TAG, "%-40s | %9.1f ml |", "PH Menge letzter Zyklus", id(ph_last_cycle_ml));
          
          // 8. PH Pumpe Restlaufzeit Zyklus
          ESP_LOGI(TAG, "%-40s | %9.2f Min |", "Restlaufzeit PH Dosierung Zyklus", (id(glo_ph_remaining_seconds) / 60.0f));
          
          // 9. PH Pumpe Laufzeit in Minuten heute
          ESP_LOGI(TAG, "%-40s | %9.2f Min |", "Laufzeit PH Dosierung heute", (id(phdispenser_today_run_time) / 60.0f));

          // 10. PH Pumpe Laufzeit in Minuten Zyklus
          ESP_LOGI(TAG, "%-40s | %9.2f Min |", "Laufzeit PH Dosierung Zyklus", (id(phdispenser_cycle_time) / 60.0f));

          ESP_LOGI(TAG, "--- Zeitsteuerung ----------------------------------------------------------------");

          // 14. Timer Einstellungen (Start & Stop Zeit)
          ESP_LOGI(TAG, "%-40s |  %02.0f:%02.0f - %02.0f:%02.0f  |", 
                   "Timer Start/Stoppzeit", id(number_timer_hour_on).state, id(number_timer_minute_on).state, id(number_timer_hour_off).state, id(number_timer_minute_off).state);

          // 15. Timer Freigabe (Dein bs_timer_allows_run)
          ESP_LOGI(TAG, "%-40s | %-12s |", "Interval/Lauf durch timer erlaubt?", id(bs_timer_allows_run).state ? "JA" : "NEIN");

          ESP_LOGW(TAG, "");
          ESP_LOGW(TAG, "##################################################################################");
          ESP_LOGW(TAG, "############################Status - End##########################################");
          ESP_LOGW(TAG, "");
          ESP_LOGW(TAG, "");

          // Updating Frontend (Einzelne Text-Felder)
          if (id(bs_pzem_online).state) {
              // 1. Polarität (Text-Sensor)
              id(txt_chlor_pol).publish_state(id(chlorinator_polarity) ? "GPIOHigh" : "GPIOLow");

              // 2. Restlaufzeit (Formatierte Minuten)
              id(txt_chlor_rest).publish_state(str_sprintf("%.1f Min", id(chlorinator_remaining_seconds) / 60.0f));

              // 3. Laufzeit heute (Formatierte Minuten)
              id(txt_chlor_today).publish_state(str_sprintf("%.1f Min", id(chlorinator_today_run_time) / 60.0f));
          } else {
              // Wenn das Modul offline ist oder kein Bedarf besteht
              id(txt_chlor_pol).publish_state("Standby");
              id(txt_chlor_rest).publish_state("derzeit keine Produktion...");
              if (id(chlorinator_remaining_seconds) == 0.0f) {
                id(txt_chlor_today).publish_state("0.0 Min");
              }
          }
          // --- PH-Werte & Laufzeiten (Update für TEXT-SENSOREN) ---
          if (id(switch_relay2_ph).state) {
              // 1. PH Heute Menge (ml oder l)
              if (id(ph_today_ml) < 1000.0f) {
                  id(txt_sens_ph_today).publish_state(str_sprintf("%.0f ml", id(ph_today_ml)));
              } else {
                  id(txt_sens_ph_today).publish_state(str_sprintf("%.2f l", id(ph_today_ml) / 1000.0f));
              }

              // 2. PH Menge dieses Zyklus (Fortschritt)
              id(txt_sens_ph_last_cycle).publish_state(str_sprintf("%.0f ml", id(ph_last_cycle_ml)));

              // 3. PH Restlaufzeit (Zyklus)
              int rest = id(glo_ph_remaining_seconds);
              if (rest < 0) rest = 0;
              id(txt_ph_countdown).publish_state(str_sprintf("%02d:%02d Min", rest / 60, rest % 60));

              // 4. PH Laufzeit Heute Gesamt
              int today_seconds = id(phdispenser_today_run_time);
              id(txt_ph_runtime).publish_state(str_sprintf("%02d:%02d Min", today_seconds / 60, today_seconds % 60));

          } else {
              // Wenn die Pumpe STEHT:
              id(txt_ph_countdown).publish_state("Inaktiv");
              
              // Menge & Laufzeit heute trotzdem aktuell halten
              if (id(ph_today_ml) < 1000.0f) {
                  id(txt_sens_ph_today).publish_state(str_sprintf("%.0f ml", id(ph_today_ml)));
              } else {
                  id(txt_sens_ph_today).publish_state(str_sprintf("%.2f l", id(ph_today_ml) / 1000.0f));
              }

                        // Letzten Zyklus-Wert statisch anzeigen
                        id(txt_sens_ph_last_cycle).publish_state(str_sprintf("%.0f ml", id(ph_last_cycle_ml)));

                        int today_seconds = id(phdispenser_today_run_time);
                        id(txt_ph_runtime).publish_state(str_sprintf("%02d:%02d Min", today_seconds / 60, today_seconds % 60));
                    }


###########Script triggered by interval for Chlorinator#########################
################################################################################
  - id: script_chlorinator_by_interval
    mode: single
    then:
      # 1) Berechne Laufzeit neu (script ist kurz)
      - script.execute: script_calc_chlorinator_runtime

      # 2) kurz warten, damit script_calc_chlorinator_runtime die globale Variable setzen kann
      - delay: 200ms

      # 3) setze verbleibende Sekunden aus der berechneten Minuten
      - lambda: |-
          // float minutes = id(chlorinator_runtime_seconds);
          // int seconds = (int)round(minutes * 60.0);
          int seconds = id(chlorinator_runtime_seconds);
          if (seconds <= 1797) {
            ESP_LOGW("chlorinator", "Berechnete Laufzeit kleiner als ~30min -> Chlorinator wird nicht gestartet.");
            return;
          }
          id(switch_chlorinator).publish_state(true);
      
      # Einschalten des Chlorinators
      # Schritt 1: 24V einschalten, falls diese aus ist
      - if:
          condition:
            - lambda: 'return !id(bs_pzem_online).state;'
          then:
            - switch.turn_on: switch_relay4_power24v
            - lambda: |- 
                ESP_LOGI("switch_chlorinator", "24 Volt Netzteil eingeschaltet!");
                id(switch_chlorinator).publish_state(true);
            - delay: 2s

      # Schritt 2: Polarity Script - Umpolung
      - script.execute: script_chlorinator_polarity
      - if:
          condition:
            lambda: return id(chlorinator_polarity);
          then:
            - switch.turn_on: switch_chlor_direction_gpio # Richtung "GPIOHigh"
            - lambda: ESP_LOGI("switch_chlorinator", "H-BrückePhase GPIO = 3,3V");
          else:
            - switch.turn_off: switch_chlor_direction_gpio # Richtung "GPIOLow"
            - lambda: ESP_LOGI("switch_chlorinator", "H-BrückePhase GPIO = 0V");
      - delay: 10s # DIE WICHTIGSTE PAUSE: Dead-Time vor dem Einschalten des Stroms
      
      # Schritt 3: H-Brücke einschalten und Zelle mit 24V bestromen
      - switch.turn_on: switch_chlor_run_gpio
      - lambda: |-
          ESP_LOGI("switch_chlorinator", "Start Chlorinator - H-BrückePWMH GPIO = 3,3V");
          ESP_LOGI("chlorinator", "Geplante Laufzeit: %d Sek", id(chlorinator_runtime_seconds));
          ESP_LOGI("switch_chlorinator", "Aktuelle Restlaufzeit: %d Sek", id(chlorinator_remaining_seconds));


################################################################################
#############Calculate the estimates duration of the chlorinator################
################################################################################
# -------------------------------------------------------------------
# Chlorinator Laufzeit-Berechnung – Feste Annahmen & Modellgrenzen
#
# Dieses Berechnungsmodell ist eine praxisnahe NÄHERUNG und basiert
# auf folgenden FESTEN ANNAHMEN:
#
# 1) Pool / Wasser
#    - Poolvolumen: 45m3 Liter (Änderbar in Globals)
#    - Salzwasserpool mit Salzkonzentration gemäß Zodiac LM2:
#      ca. 3200–4000 ppm (wird als optimal angenommen)
#
# 2) Chlorinator
#    - Elektrolysezelle: Zodiac LM2-40
#    - Maximale Chlorproduktion: 40 g Chlor pro Stunde
#    - Produktion wird linear skaliert über Effizienzfaktoren
#
# 3) ORP / Chlorbedarf
#    - Ziel-ORP: 750 mV
#    - Näherung: 10 mV ORP ≈ 0.01 mg/l freies Chlor
#    - ORP dient als Proxy für Chlorbedarf (kein direktes ppm-Messen)
#
# 4) pH-Wert
#    - Ideal-pH: 7.0
#    - Abweichungen vom Idealwert beeinflussen die Chloreffizienz
#      linear (Faustformel aus Poolpraxis)
#
# 5) Temperatur
#    - Referenztemperatur: 25 °C
#    - Höhere Temperaturen beschleunigen Reaktionen
#    - Niedrigere Temperaturen verlangsamen die Chlorwirkung
#
# 6) Umwälzung / Pumpe
#    - Poolpumpe liefert bei 100 % Frequenz: 12 m³/h
#    - Aktuelle Förderleistung wird linear aus Inverterfrequenz
#      (inv_frequency) abgeleitet
#
# 7) Modellgrenzen
#    - Keine Berücksichtigung von:
#        * Cyanursäure (CYA)
#        * direkter Sonneneinstrahlung / UV
#        * Badebelastung
#        * organischer Schmutzlast
#    - Ziel ist eine STABILE, VORHERSEHBARE Regelung,
#      keine laborgenau chemische Simulation
# -------------------------------------------------------------------

  - id: script_calc_chlorinator_runtime
    mode: single
    then:
      - lambda: |-
          // --- ONLINE MESSWERTE ---
          float orp_actual  = id(orp_measvalue).state;
          float ph_actual   = id(ph_measvalue).state;
          float temp_actual = id(sensor_water_temp).state;
          float inv_freq    = id(inv_frequency).state;  // Hz %Pumpe

          // --- KONSTANTEN ---
          const float orp_target = 750.0;                       // mV
          const float poolvolume_l = id(poolvolume);            // Liter
          const float chlorine_prod_gram_per_hour = 40.0;       // Zodiac LM2-40

          // --- 1. TAGESLIMIT PRÜFUNG ---
          // Umrechnung Minuten (max) in Sekunden für den Vergleich
          float max_daily_sec = id(chlor_run_time_max_day) * 60.0;
          
          if (id(chlorinator_today_run_time) >= max_daily_sec) {
            id(chlorinator_max_reached) = true;
            id(chlorinator_runtime_seconds) = 0;
            id(chlorinator_remaining_seconds) = 0;
            ESP_LOGW("chlorinator", "Tageslimit von %.0f min erreicht. Keine Produktion.", id(chlor_run_time_max_day));
            return;
          } else {
            id(chlorinator_max_reached) = false;
          }

          // --- 2. ORP BEDARF ---
          float orp_delta = orp_target - orp_actual;
          if (orp_delta <= 50.0) {                          // 50mV mindestens
            id(chlorinator_runtime_seconds) = 0;
            id(chlorinator_remaining_seconds) = 0;
            ESP_LOGI("chlorinator", "Keine Chlorung notwendig (Delta < 50mV).");
            return;
          }

          // ganze Poolmenge in g:
          float needed_chlorine_g = (orp_delta * 0.01) * (poolvolume_l / 1000.0);

          // --- 3. EFFIZIENZ (pH-Korrektur: Höherer pH = Längere Laufzeit) ---
          // std::max(ph_factor, 0.7f) --> stellt sicher, dass ph_factor nicht kleiner als 0.7 wird
          // std::min(..., 1.2f) --> stellt sicher, dass ph_factor nicht größer als 1.2 wird
          // pH-Faktor (äußerst relevant)
          float ph_factor = 1.0 - (ph_actual - 7.0) * 0.4;
          ph_factor = std::min(std::max(ph_factor, 0.7f), 1.2f);

          // Temperaturfaktor (höhere Temp -> schnellere Reaktion)
          float temp_factor = 1.0 - (temp_actual - 25.0) * 0.03;
          temp_factor = std::min(std::max(temp_factor, 0.7f), 1.4f);

          // Umwälzfaktor (Pumpe)
          float pump_flow_m3_h = id(poolpump_flow_max) * (inv_freq / 100.0);
          float circulation_factor = pump_flow_m3_h / id(poolpump_flow_max);
          circulation_factor = std::min(std::max(circulation_factor, 0.3f), 1.0f);

          // Gesamt-Effizienz
          float eff_total = ph_factor * temp_factor * circulation_factor;
          float effective_prod = chlorine_prod_gram_per_hour * eff_total;
          if (effective_prod <= 0.1) effective_prod = 0.1;

          // --- 4. LAUFZEIT & ZYKLUS-LIMIT ---
          float runtime_hours = needed_chlorine_g / effective_prod;
          int runtime_seconds = (int)(runtime_hours * 3600.0);
          
          // A) Begrenzung durch Zyklus-Limit
          int max_cycle_sec = (int)(id(chlor_run_time_max_cycle) * 60);
          if (runtime_seconds > max_cycle_sec) {
            runtime_seconds = max_cycle_sec;
          }

          // B) Begrenzung durch verbleibendes Tagesbudget
          int remaining_day_sec = (int)(max_daily_sec - id(chlorinator_today_run_time));
          if (runtime_seconds > remaining_day_sec) {
            ESP_LOGW("chlorinator", "Zyklus gekürzt, um Tageslimit nicht zu überschreiten (%d s übrig)", remaining_day_sec);
            runtime_seconds = remaining_day_sec;
          }

          // Falls Budget bereits verbraucht war (negativ verhindern)
          if (runtime_seconds < 0) runtime_seconds = 0;

          id(chlorinator_runtime_seconds) = runtime_seconds;
          id(chlorinator_remaining_seconds) = runtime_seconds;

          ESP_LOGI(
            "chlorinator",
            "calc: ORPΔ=%.1f| needed=%.1fg | pump=%.1fm³/h | pH=%.2f | temp=%.1f°C | sec=%d",
            orp_delta, needed_chlorine_g, pump_flow_m3_h, ph_actual, temp_actual, runtime_seconds
          );



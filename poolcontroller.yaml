            condition:
              - lambda: |-
                  return id(poolpump_ok) && (id(ph_tank_remaining) > 500);
            then:
              # 2. Dann Initialisieren (Saubere Trennung)
              - lambda: |-
                  id(phdispenser_cycle_time) = 0; 
                  id(ph_locked) = false;
                  id(switch_phdosierpumpe).publish_state(true);
                  ESP_LOGI("switch_phdosierpumpe", "Validierung erfolgreich, Zähler zurückgesetzt.");

              # 3. Physisch schalten
              - switch.turn_on: switch_relay2_ph
              - text_sensor.template.publish:
                      id: txt_sens_status
                      state: "switch_phdosierpumpe , Dosierung aktiv"
              - lambda: |-
                  ESP_LOGI("switch_phdosierpumpe", "PH Dosierpumpe wurde eingeschaltet");
            else:
              - lambda: |-
                  // Bestimme den Grund
                  std::string reason;
                  if (!id(poolpump_ok)) {
                    reason = "Vorlaufzeitpumpe nicht erreicht";
                  } else if (id(ph_tank_remaining) <= 500.0) {
                    reason = "PH Tank fast leer --> Auffüllen und Reset drücken!";
                  }
                  // Log-Ausgabe
                  id(txt_sens_status).publish_state(reason);
                  id(switch_phdosierpumpe).publish_state(false);
                  ESP_LOGW("switch_phdosierpumpe", "PH Dosierpumpe kann nicht eingeschaltet werden weil: %s", reason.c_str());
              - rtttl.play: 'error:d=8,o=5,b=100:4e6' # Kurzer Piep für Fehler!
              - switch.turn_off: switch_phdosierpumpe
    turn_off_action:
      - switch.turn_off: switch_relay2_ph
      - lambda: |-
          id(switch_phdosierpumpe).publish_state(false);
          id(glo_ph_remaining_seconds) = 0;
          ESP_LOGI("switch_phdosierpumpe", "PH Dosierung beendet. Letzter Zyklus: %.1f ml", id(ph_last_cycle_ml));
          id(txt_sens_status).publish_state(esphome::str_sprintf("PH Dosierung beendet. Letzter Zyklus: %.1f ml", id(ph_last_cycle_ml)));


  #H-Brücke schaltet Chlorinator: Phase-Pin für die Richtung
  - platform: gpio
    id: switch_chlor_direction_gpio
    internal: True
    pin:
      number: ${phase_hbridge}
      inverted: False
      mode: 
        output: true
        pulldown: true
    restore_mode: "ALWAYS_OFF"

  #H-Brücke schaltet Chlorinator: pwmH-Pin für die Richtung
  - platform: gpio
    id: switch_chlor_run_gpio
    internal: True
    pin:
      number: ${pwmh_hbridge}
      inverted: False
      mode: 
        output: true
        pulldown: true
    restore_mode: "ALWAYS_OFF"

  #Relay 1 == Not used
  - platform: gpio
    id: switch_relay1_no_use
    internal: True
    pin: ${pin_relay1}
    restore_mode: "ALWAYS_OFF"
    
  #Relay 2 == PH Dosieranlage - Internal = Not showing in HA
  - platform: gpio
    id: switch_relay2_ph
    internal: True
    pin: ${pin_relay2}
    restore_mode: "ALWAYS_OFF"

  #Relay 3 == W2839 Tuya an / aus
  - platform: gpio
    id: switch_relay3_tuya
    internal: True
    pin: ${pin_relay3}
    restore_mode: "ALWAYS_OFF"
    on_turn_on:
      then:
        - delay: 200ms
        - switch.turn_off: switch_relay3_tuya

  #Relay 4 == Netzteil 24V - - Internal = Not showing in HA
  - platform: gpio
    id: switch_relay4_power24v
    internal: True
    pin: ${pin_relay4}
    restore_mode: "ALWAYS_OFF"
    on_turn_on:
      then:
        - delay: 200ms
        - switch.turn_off: switch_relay4_power24v

  #Switch to restart the device
  - platform: restart
    name: "${friendly_name_entity} Neustart (Normal)"
    id: restart_switch
    web_server:
      sorting_group_id: grp_system
    entity_category: diagnostic
    icon: "mdi:restart"

  - platform: safe_mode
    name: "${friendly_name_entity} Neustart (Safe Mode)"
    id: restart_safe
    disabled_by_default: true 
    web_server:
      sorting_group_id: grp_debug
    entity_category: diagnostic
    icon: "mdi:shield-sync"

  #The factory_reset component allows you to invalidate (reset) all ESPHome preferences stored in flash memory and reboot your node
  - platform: factory_reset
    name: "${friendly_name_entity} Reset Konfig"
    entity_category: Diagnostic
    disabled_by_default: true 
    web_server:
      sorting_group_id: grp_debug
    icon: "mdi:factory"

  #Switch for timer component - https://github.com/hostcc/esphome-component-dynamic-on-time
  - platform: template
    id: switch_timer_mon
    icon: "mdi:calendar-check"
    name: "${friendly_name_entity} Timer Montag"

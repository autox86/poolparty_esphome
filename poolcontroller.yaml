###################### Chlorinator Polarity - Umpolung Zelle####################
################################################################################
  - id: script_chlorinator_polarity
    mode: restart # Wichtig: Falls es neu getriggert wird, bricht es alte Delays ab
    then:
      # 1. Erstmal alles AUS (Sicherheit!)
      - switch.turn_off: switch_chlor_run_gpio
      - delay: 5s # Kurze Pause, damit die H-Brücke abfallen kann
      
      # 2. Richtung umschalten
      - lambda: |-
          id(chlorinator_polarity) = !id(chlorinator_polarity);
          ESP_LOGI("chlorinator", "Polarität gewechselt, Richtung für diesen Zyklus: %s", id(chlorinator_polarity) ? "GPIOHigh" : "GPIOLow");


############################ Stopp all - Wartungsmode ##########################
################################################################################
  - id: script_stopp_all
    mode: single
    then:
      # 1) Chlorinator stoppen
      - lambda: |-
          ESP_LOGI("script_stopp_all", "Chlorinator wird gestoppt");
      - switch.turn_off: switch_chlorinator

      # 2) PH Pumpe stoppen
      - lambda: |-
          ESP_LOGI("script_stopp_all", "PH Pumpe wird gestoppt");
      - switch.turn_off: switch_phdosierpumpe

      # 3) kurze Pause für sauberes Abschalten
      - delay: 5s

      # 4) Poolpumpe ausschalten
      - if:
          condition:
            - lambda: return id(inv_running).state == 1 || (id(use_flow_dn40) && id(flow_pump).state >= 200.0);
          then:
            - lambda: |-
                ESP_LOGI("script_stopp_all", "Poolpumpe wird ausgeschaltet");
            - switch.turn_off: switch_poolpump


#################################### Pumpe starten #############################
################################################################################
  - id: script_pumpstart
    mode: restart
    then:
      - if:
          condition: 
            #Die FU darf nicht laufen UND die Frequenz darf nicht 0 sein
            - lambda: "return (id(inv_running).state != 1 && id(glo_set_frequency) >= 55);"
          then:
            - lambda: |-
                ESP_LOGI("script_pumpstart","Initiere Pumpenstart... Starte Pumpe auf 100%%");

            # 1.) FU auf 100% setzen
            - number.set:
                id: number_target_frequency
                value: 100

            # 2.) Pumpe starten
            - switch.turn_on: switch_poolpump

            # 3.) kurz warten und prüfen, ob inv_running = 1
            - delay: 10s
            - if:
                condition:
                  - lambda: "return (id(inv_running).state == 1);"
                then:
                  - if:
                      condition:
              # 4.) Wenn DN40 Flow Sensor aktiv ist → 15 Sekunden warten
                        - lambda: |-
                            ESP_LOGI("script_pumpstart","FU läuft, warte 15s und überprüfe Durchfluss am DN40");
                            return id(use_flow_dn40);
                      then:
                        - delay: 15s
              # 5.) DN40 prüfen oder ignorieren weil nicht installiert
                  - if:
                      condition:
                        - lambda: |-
                            if (id(use_flow_dn40)) {
                              return id(flow_pump).state > 200.0;
                            } else {
                              return true;
                            }
                      then:
                        # Erfolg
                        - lambda: |-
                            ESP_LOGI("script_pumpstart","Pumpenstart erfolgreich, in 2 Min Rückkehr zum Betriebsmodus");
                        # Start erfolgreich, wir setzen in 2min zurück auf den gewählte Geschwindigkeit vom Betriebsmodus
                        - delay: 2min
                        - lambda: |-
                            // current_option() → liest den aktuell gewählten Modus (z.B. "35% Stromsparen").
                            const std::string mode = id(select_work_mode).current_option();

                            // Logging mit ESP_LOGI zeigt an, dass das Select getriggert wird.
                            ESP_LOGI("workmode_pump", "Setze Betriebsmodus erneut auf: %s, um das set_action erneut auszuführen", mode.c_str());

                            // Wir triggern direkt die Frequenz-Anpassung
                            auto call = id(number_target_frequency).make_call();
                            call.set_value(id(glo_set_frequency)); // Nutzt den Wert aus dem Modus-Select
                            call.perform();
                            ESP_LOGI("script_pumpstart", "Anlaufphase beendet. Kehre zu Modus-Frequenz %.0f%% zurück.", id(glo_set_frequency));
                      else:
                        # Fehler
                        - lambda: |-
                            ESP_LOGE("script_pumpstart","Pumpenstart fehlgeschlagen: kein Durchfluss. Prüfen!");
                        - switch.turn_off: switch_poolpump
                else:
                  - lambda: |-
                      ESP_LOGE("script_pumpstart","Pumpenstart fehlgeschlagen: FU meldet sich nicht");
                  - switch.turn_off: switch_poolpump
          else:
            - lambda: |-
                ESP_LOGW("script_pumpstart","Pumpenstart übersprungen: FU läuft bereits");


############Improved check_PumpPreRunTime Script################################
################################################################################
  - id: script_check_PumpPreRunTime
    mode: single
    then:
      - lambda: |-
          if (id(inv_running).state == 1) {
              if (id(poolpump_start_time) == 0) {
                  id(poolpump_start_time) = millis();
                  ESP_LOGI("pump_timer", "Pumpe gestartet, Vorlauf beginnt.");
              }

              // Zeitdifferenz berechnen
              unsigned long elapsed = millis() - id(poolpump_start_time);
              bool is_finished = (elapsed >= (unsigned long)id(PumpPreRunTime) * 60000);

              // Nur bei Änderung schalten (verhindert unnötiges Log-Spamming)
              if (is_finished && !id(poolpump_ok)) {
                  id(poolpump_ok) = true;
                  ESP_LOGI("pump_timer", "Vorlaufzeit abgeschlossen. Dosierung freigegeben.");
              }
          } else {
              // Pumpe aus oder im Standby -> Alles auf Anfang
              if (id(poolpump_start_time) != 0 || id(poolpump_ok)) {
                  id(poolpump_start_time) = 0;
                  id(poolpump_ok) = false;
                  ESP_LOGI("pump_timer", "Pumpe gestoppt, Timer zurückgesetzt.");
              }
          }



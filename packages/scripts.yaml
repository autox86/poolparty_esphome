#Adding lockout - Hardware defekt?
  - id: script_tuya_watchdog
    mode: single
    then:
      - lambda: |-
          if (id(glo_tuya_error_lockout)) return; // Abbruch, wenn bereits gesperrt

          bool needs_toggle = false;
          uint32_t now = millis();
          const uint32_t timeout_ms = 60000;      // 1 Minute kein Signal
          const uint32_t lockout_window = 3600000; // 60 Minuten Zeitfenster

          // 1. TIMEOUT-CHECK
          if (id(glo_tuya_allowed) && (now - id(glo_tuya_last_seen_ms) > timeout_ms)) {
              if (id(glo_tuya_online)) {
                ESP_LOGW("tuya_watchdog", "TIMEOUT: Keine Daten. Setze auf Offline.");
                id(glo_tuya_online) = false;
                id(bs_tuya_online).publish_state(false);
              }
          }

          // 2. ZUSTANDS-PRÜFUNG
          if (id(glo_tuya_allowed) != id(glo_tuya_online)) {
              needs_toggle = true;
          }

          // 3. TOGGLE LOGIK (ELTAKO)
          if (id(uptime_raw).state >= 60 && needs_toggle) {
            id(glo_tuya_toggle_count)++;

            if (id(glo_tuya_toggle_count) >= 3) {
              
              // --- NEU: LOCKOUT LOGIK START ---
              // Wenn das Zeitfenster abgelaufen ist, Zähler zurücksetzen
              if (now - id(glo_tuya_lockout_start_ms) > lockout_window) {
                id(glo_tuya_lockout_start_ms) = now;
                id(glo_tuya_lockout_counter) = 0;
              }

              id(glo_tuya_lockout_counter)++;

              if (id(glo_tuya_lockout_counter) >= 4) {
                ESP_LOGE("tuya_watchdog", "!!! LOCKOUT !!! 4 Toggles in 60 Min. Hardware gesperrt!");
                id(glo_tuya_error_lockout) = true;
                id(bs_tuya_lockout).publish_state(true);
                //Wir verbieten PH und ORP zu laufen!
                id(glo_orp_allowed) = false;
                id(glo_ph_allowed) = false;
                return;
              }
              // --- NEU: LOCKOUT LOGIK ENDE ---

              ESP_LOGW("tuya_watchdog", "Toggle-Impuls für Modus: %s", id(glo_tuya_allowed) ? "AN" : "AUS");
              id(switch_relay3_tuya).turn_on();
              id(glo_tuya_toggle_count) = 0;
              
              id(glo_tuya_last_seen_ms) = now; 
              id(glo_tuya_online) = id(glo_tuya_allowed);
              id(bs_tuya_online).publish_state(id(glo_tuya_allowed));

              if (!id(glo_tuya_allowed)) {
                id(ph_measvalue).publish_state(NAN);
                id(orp_measvalue).publish_state(NAN);
                id(tuya_temp).publish_state(NAN);
              }
            }
          }

############################## Bootscript#######################################
################################################################################
  - id: script_on_boot
    mode: restart
    then:
      - lambda: |-
          
          id(boot_log_buffer) = "BOOT-START: Initialisierung...\n";
          // Wir erzwingen in der Software sofort den Zustand AUS
          id(switch_chlorinator).publish_state(false);
          id(boot_log_buffer) += "PHASE 1: Chlorinator-Switch-State auf AUS gesetzt.\n";
          
          // 1. HA Sync: Werte aus Globals in die UI pushen
          // Frequenz
          id(number_target_frequency).publish_state(id(glo_set_frequency)); 

          //Tuya global
          id(glo_tuya_last_seen_ms) = millis();

          // PH / ORP Parameter
          id(ph_min_setter).publish_state(id(ph_min));
          id(ph_max_setter).publish_state(id(ph_max));
          id(orp_min_setter).publish_state(id(glo_orp_min));
          id(orp_max_setter).publish_state(id(glo_orp_max));
          id(num_orp_target_setter).publish_state(id(glo_orp_target));
          id(ph_max_day_setter).publish_state(id(max_ph_ml_per_day));
          id(ph_max_cycle_setter).publish_state(id(max_ph_ml_per_cycle));
          id(ph_pump_setter).publish_state(id(ph_ml_per_second) * 3.6);
          id(chlor_run_time_max_day_setter).publish_state(id(chlor_run_time_max_day));
          id(ph_tank_capacity_setter).publish_state(id(ph_tank_capacity_ml));
          id(num_low_salt_limit).publish_state(id(glo_low_salt_limit));
          id(bs_tuya_lockout).publish_state(id(glo_tuya_error_lockout));
          id(bs_chlor_lockout).publish_state(id(glo_chlor_error_lockout));
          id(bin_low_salt_warning).publish_state(id(glo_low_salt));
          id(bs_inv_online).publish_state(id(glo_inv_online));
          id(bs_inv_running).publish_state(false);
          id(bs_tuya_online).publish_state(id(glo_tuya_online));
          id(bs_pzem_online).publish_state(id(glo_pzem_online));
          id(bs_hp_online).publish_state(id(glo_hp_online));
          id(bs_energy_meter_online).publish_state(id(glo_energy_online));
          id(bs_tank_empty).publish_state(id(ph_tank_refill));
          id(bs_pump_lockout).publish_state(id(glo_pump_lockout));
          id(sensor_outdoor_temp).publish_state(0.0);
          id(sensor_water_temp).publish_state(0.0);
          // id(sensor_water_temp_hp).publish_state(0.0);
          
          // Inverter / Pumpe
          id(pump_prerun_time_setter).publish_state(id(PumpPreRunTime));
          id(glo_pump_active_via_automation) = false; //resete den Wert nach Boot

          // Flow-Sensor Select UI Sync
          if (id(use_flow_dn40) && id(use_flow_s201)) {
              id(select_flowsensor).publish_state("YF-DN40 & YF-S201");
          } else if (id(use_flow_dn40)) {
              id(select_flowsensor).publish_state("YF-DN40");
          } else if (id(use_flow_s201)) {
              id(select_flowsensor).publish_state("YF-S201");
          } else {
              id(select_flowsensor).publish_state("No Flow Sensors");
          }

      # 2. ZeitSync
      - wait_until:
          condition:
            time.has_time:
          timeout: 15s
      
      - delay: 10s
      - lambda: |-
          
          ///////// Chlorinator Online Status after Boot ////////
          ///////////////////////////////////////////////////////
          // Wir holen den Rohwert des Spannungssensors
          float v = id(pzem_dc_voltage).state;
          
          // Wenn das Netzteil aus ist, liefert der PZEM keine Daten.
          // ESPHome markiert den Sensor dann als 'nan' (Not a Number).
          bool is_online = !std::isnan(v) && v > 10.0;
          
          // Jetzt setzen wir unseren Online-Sensor aktiv auf den echten Status
          id(bs_pzem_online).publish_state(is_online);

          // --- DER ABGLEICH ---
          if (is_online != id(switch_chlorinator).state) {
              id(boot_log_buffer) += "DISREPANZ: Netzteil ist AN! Schalte Chlorinator AUS...\n";
              id(switch_chlorinator).turn_off(); 
          } else {
              id(boot_log_buffer) += "STATUS: Alles synchron. Keine Aktion nötig.\n";
          }

          ///////// Inverter Online Status after Boot ////////
          ////////////////////////////////////////////////////
          // Wir holen den Rohwert des Spannungssensors
          float run_state = id(inv_running).state;

          // Nur wenn run_state sinnhafte Zahlen hat und der Status 1 (läuft) oder 3 (aus)
          bool is_online2 = !std::isnan(run_state) && (run_state == 1.0 || run_state == 3.0);
          
          // Jetzt setzen wir unseren Online-Sensor aktiv auf den echten Status
          id(bs_inv_online).publish_state(is_online2);

          //Jetzt schreiben wir ein Log, welches wir in api: on_connected auslesen
          //(ESPHome Log Screen erst nach dem Piep öffnen)
          // char line[128];
          // snprintf(line, sizeof(line), 
          //          "PHASE 2 PZEM Spannung: %.1fV Online: %s | INV-Status: %.0f Online: %s\n", 
          //          v, is_online ? "Ja" : "Nein",
          // run_state, is_online2 ? "Ja" : "Nein");
          // id(boot_log_buffer) += line;
          char line[128];
          snprintf(line, sizeof(line), 
                   "PHASE 2 PZEM Spannung: %.1fV Online: %s | INV-Status: %.0f Online: %s\nglo_set_frequency beim Boot: %.0f%%\n", 
                   v,                          // gehört zu %.1f
                   is_online ? "Ja" : "Nein",  // gehört zu %s (Spannung)
                   run_state,                  // gehört zu %.0f (INV-Status)
                   is_online2 ? "Ja" : "Nein", // gehört zu %s (INV Online)
                   (float)id(glo_set_frequency) // gehört zu %.0f (Frequenz)
          );
          id(boot_log_buffer) += line;


          ///////// Grund für Neustart in einen Sensor schreiben ////////
          ///////////////////////////////////////////////////////////////
          // 1. Hole die Zahl (Enum) vom System
          esp_reset_reason_t reason = esp_reset_reason();
          std::string reason_str;
          bool restart_allowed_bool;

          // 2. Hier passiert die Magie: Zahl in Text umwandeln
          switch (reason) {
            case ESP_RST_POWERON:  reason_str = "Kaltstart (Power On)"; restart_allowed_bool = true; break;
            case ESP_RST_SW:       reason_str = "Software Restart (OTA update / Restart)"; restart_allowed_bool = true; break;
            case ESP_RST_BROWNOUT: reason_str = "Spannungsabfall (Brownout)"; restart_allowed_bool = true; break;
            case ESP_RST_TASK_WDT: reason_str = "Watchdog (Systemhänger)"; restart_allowed_bool = false; break;
            case ESP_RST_PANIC:    reason_str = "System-Crash (Panic)"; restart_allowed_bool = false; break;
            default:               reason_str = "Anderer Grund"; restart_allowed_bool = false; break;
          }

          // 3. Jetzt erst speichern und senden
          id(glo_last_reset_reason) = reason_str;
          //Variabel wird gebraucht für automatischen restart der Anlage
          id(glo_restart_allowed) = restart_allowed_bool;
          id(last_reset_reason_sensor).publish_state(reason_str);

          //Workmode erneut setzen nach Reboot (Sicherheitshalber)
          // Wir lösen die komplette Logik aus, als hätte jemand den das Select ausgewählt
          auto call = id(select_work_mode).make_call();
          call.set_option(id(select_work_mode).current_option()); // Nutzt den wiederhergestellten Wert
          call.perform();


      - rtttl.play: 'two_short:d=4,o=5,b=100:16e6,16e6'



################################################################################
  - id: script_stopp_chlor
    mode: single
    then:
      # 1) Chlorinator stoppen
      - lambda: |-
          ESP_LOGI("script_stopp_chlor", "Chlorinator wird gestoppt");
      - switch.turn_off: switch_chlorinator


################################# Stopp PH #####################################
################################################################################
  - id: script_stopp_ph
    mode: single
    then:

###################### Chlorinator Polarity - Umpolung Zelle####################
################################################################################
  - id: script_chlorinator_polarity
    mode: restart # Wichtig: Falls es neu getriggert wird, bricht es alte Delays ab
    then:
      # 1. Erstmal alles AUS (Sicherheit!)
      - switch.turn_off: switch_chlor_run_gpio
      - delay: 5s # Kurze Pause, damit die H-Brücke abfallen kann
      
      # 2. Richtung umschalten
      - lambda: |-
          id(chlorinator_polarity) = !id(chlorinator_polarity);
          ESP_LOGI("chlorinator", "Polarität gewechselt, Richtung für diesen Zyklus: %s", id(chlorinator_polarity) ? "GPIOHigh" : "GPIOLow");


############################ Stopp all - Wartungsmode ##########################
################################################################################
  - id: script_stopp_all
    mode: single
    then:
      # 1) Chlorinator stoppen
      - lambda: |-
          ESP_LOGI("script_stopp_all", "Chlorinator wird gestoppt");
      - switch.turn_off: switch_chlorinator

      # 2) PH Pumpe stoppen
      - lambda: |-
          ESP_LOGI("script_stopp_all", "PH Pumpe wird gestoppt");
      - switch.turn_off: switch_phdosierpumpe

      # 3) kurze Pause für sauberes Abschalten
      - delay: 5s

      # 4) Poolpumpe ausschalten
      - if:
          condition:
            - lambda: return id(inv_running).state == 1 || (id(use_flow_dn40) && id(flow_pump).state >= id(glo_flow_pump_m3));
          then:
            - lambda: |-
                ESP_LOGI("script_stopp_all", "Poolpumpe wird ausgeschaltet");
            - switch.turn_off: switch_poolpump



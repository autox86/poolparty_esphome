      then:
        - lambda: |- 
            auto call = id(select_work_mode).make_call();
            call.set_option("0% Wartung");
            call.perform();
    turn_off_action: 
      then:
      - lambda: |- 
            auto call = id(select_work_mode).make_call();
            call.set_option(id(glo_workmode));
            call.perform();
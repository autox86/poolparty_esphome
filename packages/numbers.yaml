  # Durchfluss Poolpumpe bei 100%
  - platform: template
    name: "Durchfluss PoolPumpe 100%"
    id: poolpump_flow_max_setter
    icon: "mdi:gauge-full"
    web_server:
      sorting_group_id: grp_config
      sorting_weight: 90
    unit_of_measurement: "m3/h"
    entity_category: config
    optimistic: false
    restore_value: true
    min_value: 6.0
    max_value: 16.0
    step: 0.5
    set_action:
      - lambda: |-
          // Globale Variabel setzen
          id(poolpump_flow_max) = x;
          // HA informieren
          id(poolpump_flow_max_setter).publish_state(x);


  # PH Kanister Größe (ml)
  - platform: template
    name: "PH Kanister Größe"
    id: ph_tank_capacity_setter
    icon: "mdi:barrel"
    web_server:
      sorting_group_id: grp_config
      sorting_weight: 69
    unit_of_measurement: "ml"
    entity_category: config
    optimistic: false
    restore_value: true
    min_value: 5000
    max_value: 30000
    step: 500
    set_action:
      - lambda: |-
          // PH-Tankgröße setzen
          id(ph_tank_capacity_ml) = x;

          // Wenn aktueller Tankinhalt größer als neue Kapazität -> anpassen
          if (id(ph_tank_remaining) > x) {
            id(ph_tank_remaining) = x;
          }

          // HA informieren
          id(ph_tank_capacity_setter).publish_state(x);
      - logger.log:
          format: "PH Kanistergröße auf %.0f ml gesetzt"
          args: ['x']
          level: INFO

  # PH Max Wert Wasser
  - platform: template
    name: "PH Max Wert Wasser"
    id: ph_max_setter
    icon: "mdi:ph"
    web_server:
      sorting_group_id: grp_config
      sorting_weight: 81
    entity_category: config
    restore_value: true
    optimistic: false
    min_value: 6.0
    max_value: 8.5
    step: 0.1
    set_action:
      - lambda: |-
          if (x <= id(ph_min)) {
            ESP_LOGW("PH", "PH Max muss größer als PH Min sein");
            id(ph_max_setter).publish_state(id(ph_max));
            return;
          }
          id(ph_max) = x;
          id(ph_max_setter).publish_state(x);


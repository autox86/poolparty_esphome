
#Working - Number Input for Modbus Value
number:
  - platform: modbus_controller
    name: "INV: Setze Zielfrequenz in %"
    modbus_controller_id: modbus_freq_inv
    id: number_target_frequency
    icon: "mdi:speedometer"
    disabled_by_default: true 
    web_server:
      sorting_group_id: grp_debug
    entity_category: config
    unit_of_measurement: "%"
    min_value: 50
    max_value: 100
    multiply: 100
    address: 0x1000
    step: 1
    
    # Darf hier nicht gesetzt werden, weil das sonst zu Problemen führt mit der 100% Anlaufphase in script_pumpstart
    # on_value:
    #   - lambda: |-
    #       id(glo_set_frequency) = x;

# ###########################################
# # Template Numbers / Setter für ESPHome   #
# # Steuern PH, ORP, Chlorinator, Pumpen    #

  # PH Förderleistung (Einstellung in l/h, Speicherung in ml/s)
  - platform: template
    name: "PH Förderleistung (l-h)"
    id: ph_pump_setter
    icon: "mdi:pump"
    web_server:
      sorting_group_id: grp_config
      sorting_weight: 72
    unit_of_measurement: "l/h"
    entity_category: config
    restore_value: true
    optimistic: false
    # SEKO PERC3 gemessen: 2,66l/h ~ 0.7388ml/s
    # Wird durch Verschleiß weniger und gilt es zu überprüfen
    # wenn angeschlossen an Kreislauf und Impfventil
    min_value: 1.0
    max_value: 3.5
    step: 0.01 # 100ml Schritte
    set_action:
      - lambda: |-
          // 1. Den Wert für die Anzeige im Webserver spiegeln (l/h)
          id(ph_pump_setter).publish_state(x);
          
          // 2. Umrechnung für die interne Variable (l/h -> ml/s)
          // Formel: (x * 1000) / 3600  => x / 3.6
          id(ph_ml_per_second) = x / 3.6;
          
          ESP_LOGI("ph_pump_setter", "PH Förderleistung angepasst: %.2f l/h (entspricht %.4f ml/s)", x, id(ph_ml_per_second));



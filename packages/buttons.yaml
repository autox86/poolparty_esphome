
button:
################################################################################
######################ACHTUNG: NUR Einmalig ausführen###########################
##Ändert die Slave ID des PZEM17
##Danach bitte pzem_hub - adresse ändern auf 04!
################################################################################
  # - platform: template
  #   name: "PZEM-017 Adresse auf 0x04 setzen"
  #   on_press:
  #     then:
  #       # Wir nutzen die uart_id deines Modbus-Busses (z.B. uart_0 oder uart_pzem)
  #       - uart.write: 
  #           id: modbus_uart
  #           # Modbus Befehl: [Adresse, Funktion 06, Register High, Register Low, Wert High, <SLAVE-ID>, CRC, CRC]
  #           data: [0x01, 0x06, 0x00, 0x02, 0x00, 0x04, 0x28, 0x09]
            
            #Hinweis:
            # Von 04 wieder auf 01 wäre dann also:
            #data: [0x04, 0x06, 0x00, 0x02, 0x00, 0x01, 0x28, 0x09]
  
  - platform: template
    name: "Chlorinator Fehler Reset"
    icon: "mdi:sync-alert"
    web_server:
      sorting_group_id: grp_error
      sorting_weight: 98
    on_press:
      then:
        - lambda: |-
            id(glo_chlor_error_lockout) = false;
            id(glo_chlor_fail_count) = 0;
            id(bs_chlor_lockout).publish_state(false);
            ESP_LOGI("chlor_watchdog", "Sperre manuell aufgehoben.");

  - platform: template
    name: "Tuya Fehler Reset"
    icon: "mdi:sync-alert"
    web_server:
      sorting_group_id: grp_error
      sorting_weight: 100
    on_press:
      then:
        - lambda: |-
            id(glo_tuya_error_lockout) = false;
            id(bs_tuya_lockout).publish_state(false);
            id(glo_tuya_toggle_count) = 0;
            id(glo_tuya_last_reset_ms) = millis();
            ESP_LOGI("tuya_watchdog", "Sperre wurde manuell aufgehoben.");

  - platform: template
    name: "PH Tank Reset"
    id: bt_ph_tank_reset_web
    icon: "mdi:sync-off"
    entity_category: config
    web_server:
      sorting_group_id: grp_status
      sorting_weight: 27
    on_press:
      then:
        - lambda: |-
            id(ph_tank_remaining) = id(ph_tank_capacity_ml);
            id(ph_tank_refill) = false;
            id(ph_tank_sensor).publish_state(id(ph_tank_remaining) / 1000.0);
            ESP_LOGI("PH Tank", "Reset via Web: Tank voll.");
        - rtttl.play: 'two_short:d=4,o=5,b=100:16e6,16e6'

  - platform: template
    name: "PH Heute (ml) Reset"
    id: ph_today_reset_web
    icon: "mdi:sync-off"
    entity_category: config
    web_server:
      sorting_group_id: grp_status
      sorting_weight: 30
    on_press:
      then:
        - lambda: |-
            id(ph_today_ml) = 0.0;
            // Hier die Änderung: Zahl in Text umwandeln oder einfach "0 ml" schreiben
            id(txt_sens_ph_today).publish_state("0 ml"); 
            ESP_LOGI("PH Max Day Reset", "PH heute (ml) zurückgesetzt");
        - rtttl.play: 'two_short:d=4,o=5,b=100:16e6,16e6'


#when VFD is running state=1, when VFD is not running state=3
  - platform: modbus_controller
    modbus_controller_id: modbus_freq_inv
    name: "INV: Running Status"
    internal: true
    id: inv_running
    address: 0x3000
    register_type: holding
    bitmask: 3
    web_server:
      sorting_group_id: grp_status
      sorting_weight: 38
    entity_category: diagnostic
    icon: "mdi:state-machine"
    #update_interval: 5
    on_value:
      then:
        - lambda: |-
            if (x == 1) {
              id(bs_inv_running).publish_state(true);
            } else if (x == 3) {
              id(bs_inv_running).publish_state(false);
            }

#PZEMDC über Modbus
  - platform: modbus_controller
    modbus_controller_id: pzem_hub
    name: "${name_pzem17} Spannung"
    id: pzem_dc_voltage
    icon: "mdi:flash"
    register_type: read
    address: 0x0000
    web_server:
      sorting_group_id: grp_sensors
      sorting_weight: 54
    unit_of_measurement: "V"
    value_type: U_WORD
    accuracy_decimals: 2
    force_update: true
    filters:
      - multiply: 0.01  # 0x0540 = 1344 -> 134.4V (Beispielwert)

  - platform: modbus_controller
    modbus_controller_id: pzem_hub
    name: "${name_pzem17} Stromstärke"
    id: pzem_dc_current
    icon: "mdi:current-dc"
    register_type: read
    address: 0x0001
    web_server:
      sorting_group_id: grp_sensors
      sorting_weight: 57
    unit_of_measurement: "A"
    value_type: U_WORD
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
      # Ein Delta von 0.05A bis 0.1A ist meist ideal. 
      # So werden kleine Schwankungen (Rauschen) ignoriert.
      - delta: 0.05
      # ODER: Sende spätestens alle 60 Sekunden einen Wert an HA auch wenn er gleich blieb.
      - heartbeat: 10s
      - throttle: 30s  # Nur alle 300s einen Wert ausgeben

  - platform: template
    name: "${name_pzem17} Leistung Wirkrichtung"
    id: pzem_dc_power
    unit_of_measurement: "W"
    web_server:
      sorting_group_id: grp_sensors
      sorting_weight: 60
    icon: "mdi:lightning-bolt"
    accuracy_decimals: 1
    state_class: measurement
    lambda: |-
      float pwr = id(pzem_dc_power_raw).state;
      // Wir prüfen, ob dein Umpol-Relais gerade aktiv ist
      if (!(id(switch_chlor_direction_gpio).state) && (pwr >= 4.0)) {
        return pwr * -1.0;
      } else {
        return pwr;
      }
    # Da sich der Wert ändern muss, wenn entweder die Leistung 
    # oder das Relais sich ändert, nutzen wir ein kurzes Intervall.
    update_interval: 10s
    filters:
      # DELTA-Filter: Sende nur, wenn sich der Wert um mindestens 3.0 Watt 
      # zum letzten gesendeten Wert unterscheidet.
      - delta: 3.0
      - heartbeat: 60s #Heartbeat damit der Sensor in HA nicht unterbricht

  - platform: modbus_controller
    modbus_controller_id: pzem_hub
    id: pzem_dc_power_raw
    internal: true
    register_type: read
    icon: "mdi:lightning-bolt"
    address: 0x0002
    value_type: U_DWORD_R 
    unit_of_measurement: "W"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1


  - platform: total_daily_energy
    name: "${name_pzem17} Energie Heute"
    id: pzem_dc_energy_daily
    icon: "mdi:counter"
    power_id: pzem_dc_power_raw
    web_server:
      sorting_group_id: grp_sensors
      sorting_weight: 63
    unit_of_measurement: "kWh"
    state_class: total_increasing
    device_class: energy
    accuracy_decimals: 3
    filters:
      # Umrechnung von Wattstunden (Wh) in Kilowattstunden (kWh)
      - multiply: 0.001

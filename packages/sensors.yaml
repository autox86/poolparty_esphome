sensor:
  - platform: uptime
    id: uptime_raw
    name: "uptime raw"
    internal: true
    update_interval: 30s
    entity_category: diagnostic

  - platform: wifi_signal
    name: "WiFi Signal "
    update_interval: 300s
    web_server:
      sorting_group_id: grp_system
    entity_category: diagnostic
    device_class: signal_strength
    state_class: measurement
    icon: "mdi:wifi"

  - platform: dallas_temp
    id: sensor_outdoor_temp
    name: "Außentemperatur °C"
    # adress ist im Log, für ersten Start 
    # address auskommentieren und nur den "neuen" Dallas anschließen
    address: 0x843c01b556227b28
    icon: "mdi:thermometer"
    web_server:
      sorting_group_id: grp_sensors
      sorting_weight: 51
    

  - platform: dallas_temp
    id: sensor_water_temp
    name: "Wasser Temperatur"
    # address ist im Log, für ersten Start 
    # address auskommentieren und nur den "neuen" Dallas anschließen
    #address: 0x843c01b556227b28
    icon: "mdi:thermometer"
    web_server:
      sorting_group_id: grp_status
      sorting_weight: 47

  - platform: template
    name: "Poolpumpe Vorlaufzeit Timer"
    unit_of_measurement: "min"
    update_interval: 10s
    web_server:
      sorting_group_id: grp_status
      sorting_weight: 23
    device_class: duration
    state_class: measurement
    entity_category: diagnostic
    icon: "mdi:timer-sand"
    lambda: |-
      if (id(poolpump_start_time) == 0) return 0.0f;
      
      float elapsed = (millis() - id(poolpump_start_time)) / 60000.0f;
      
      // Begrenze die Anzeige auf die maximale Vorlaufzeit
      if (elapsed > id(PumpPreRunTime)) {
        return (float)id(PumpPreRunTime);
      }
      return elapsed;

  - platform: template
    name: "PH Tank Restinhalt"
    id: ph_tank_sensor
    unit_of_measurement: "L"
    accuracy_decimals: 2
    icon: "mdi:barrel"
    web_server:
      sorting_group_id: grp_status
      sorting_weight: 26
    state_class: measurement
    lambda: |-
      return id(ph_tank_remaining) / 1000.0;  // ml → Liter
    update_interval: 120s  # optional, alle 10 Sekunden aktualisieren


  #Reading tuya W2839 Pool ORP / PH / Temp
  - platform: "tuya"
    name: "Temperatur Pool Controller"
    internal: false
    id: tuya_temp
    sensor_datapoint: 8
    unit_of_measurement: "°C"
    web_server:
      sorting_group_id: grp_sensors
      sorting_weight: 93
    device_class: "temperature"
    state_class: "measurement"
    icon: "mdi:thermometer"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    on_value:
      then:
        - lambda: |-
            if (!std::isnan(x)) { 
              id(glo_tuya_last_seen_ms) = millis(); // <--- ZEITSTEMPEL MERKEN
              if (!id(glo_tuya_online)) {
                 id(glo_tuya_online) = true;
                 id(bs_tuya_online).publish_state(true);
                 ESP_LOGI("tuya", "Daten empfangen -> Online");
              }
            }

  - platform: "tuya"
    name: "Aktueller PH Wert"
    id: ph_measvalue
    sensor_datapoint: 106
    web_server:
      sorting_group_id: grp_status
      sorting_weight: 45
    device_class: "ph"
    state_class: "measurement"
    icon: "mdi:ph"
    accuracy_decimals: 2
    filters:
        - multiply: 0.01
        - throttle: 30s

  - platform: "tuya"
    name: "Aktueller ORP Wert"
    id: orp_measvalue
    sensor_datapoint: 131
    web_server:
      sorting_group_id: grp_status
      sorting_weight: 41
    unit_of_measurement: "mV"
    state_class: "measurement"
    icon: "mdi:shimmer"
    filters:
      - throttle: 30s


########################## YF DN40 Flow Meter – Pumpe###########################
################################################################################
  - platform: pulse_counter
    id: flow_pump
    pin: ${yfdn40}
    name: "Durchfluss Pumpe L-Std."
    update_interval: 5s
    web_server:
      sorting_group_id: grp_sensors
      sorting_weight: 66
    state_class: measurement
    device_class: water
    icon: "mdi:waves"
    unit_of_measurement: "L/Std."
    filters:
      # Pulses per Liter/min = 27 -> Kalibrierung für DN40
      # x = Pulse im Intervall, umrechnen auf L/Std.
      # Pulses per Liter/min: 27 (x/27) => x is pulses received =x L/min *60 = x L/hr
      - lambda: |-
          return (x / 27.0) * 60.0;  // L/Std.
      - throttle: 10s  # nur alle 10s an HA senden
    total:
      name: "Durchfluss Pumpe Tag"
      unit_of_measurement: "L"
      device_class: water
      state_class: total_increasing
      web_server:
        sorting_group_id: grp_sensors
        sorting_weight: 69
      icon: "mdi:water-check"
      filters:
        # Tageswert kumuliert aus Pulse -> Liter
        - lambda: |-
            return x / 27.0;  // L gesamt


###################### YF S201 Flow Meter – Messzelle###########################
################################################################################
  - platform: pulse_counter
    id: flow_meter
    pin: ${yfs201}
    name: "Durchfluss Messzelle L-Std."
    update_interval: 5s
    web_server:
      sorting_group_id: grp_sensors
      sorting_weight: 72
    state_class: measurement
    device_class: water
    icon: "mdi:water-sync"
    unit_of_measurement: "L/Std."
    filters:
      # Pulses per Liter/min = 450 -> Kalibrierung für S201
      #Pulses per Liter/min: 450 (x/27) => x is pulses received =x L/min *60 = x L/hr
      - lambda: |-
          return (x / 450.0) * 60.0;  // l/Std.
      - throttle: 10s  # nur alle 10s an HA senden
    total:
      name: "Durchfluss Messzelle Tag"
      unit_of_measurement: "L"
      device_class: water
      state_class: total_increasing
      web_server:
        sorting_group_id: grp_sensors
        sorting_weight: 75
      icon: "mdi:opacity"
      filters:
      #   # Tageswert kumuliert aus Pulse -> Liter
        - lambda: |-
            return x / 450.0;  // L gesamt

